{% extends "base.html" %}

{% block content %}

<div class="card card-custom p-4">

    <h4>Nuevo Alumno</h4>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">Guardar</button>

        <a href="{% url 'grupo_detail' view.kwargs.grupo_id|default:object.grupo.id %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
