<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}SERIART{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div><strong>SERIART</strong></div>
        <div style="margin: auto;">PAQUETES DE GRADUACIÓN</div>
    </div>

    <div class="layout d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <!-- BUSCADOR -->
            <form method="GET">
                <input type="text" class="form-control mb-2" placeholder="GEN, ESC, ALUMNO">
                <button class="btn btn-primary w-100">BUSCAR</button>
            </form>

            <div class="menu-item">• <a href="#">GENERACIONES</a></div>
            <div class="menu-item">• <a href="#">ESCUELAS</a></div>
            <div class="menu-item">• <a href="#">GRUPOS</a></div>
            <div class="menu-item">• <a href="#">ALUMNOS</a></div>
            <div class="menu-item">• <a href="#">PEDIDOS</a></div>
            <div class="menu-item">• <a href="#">CATALOGO</a></div>

        </div>

        <!-- CONTENIDO DINÁMICO -->
        <div class="content w-100">
            {% block content %}
            {% endblock %}
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer text-center">
        Sistema para gestionar generaciones, escuelas, grupos, alumnos, pedidos y pagos
    </div>

</body>

</html>
