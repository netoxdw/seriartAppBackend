{% extends "base.html" %}

{% block content %}

<div class="card p-4 text-center">

    <h4>¿Eliminar descuento?</h4>

    <p>
        ${{ object.monto }} - {{ object.motivo }}
    </p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Eliminar</button>
    </form>

    <a href="{% url 'pedido_detail' object.pedido_id %}" class="btn btn-secondary mt-2">
        Cancelar
    </a>

</div>

{% endblock %}
