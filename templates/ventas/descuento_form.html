{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>
        {% if object %}Editar Descuento{% else %}Nuevo Descuento{% endif %}
    </h4>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Monto</label>
            {{ form.monto }}
        </div>

        <div class="mb-3">
            <label>Motivo</label>
            {{ form.motivo }}
        </div>

        <button class="btn btn-success">Guardar</button>

        <a href="{% url 'pedido_detail' pedido_id %}" class="btn btn-secondary">
            Cancelar
        </a>
    </form>

</div>

{% endblock %}
