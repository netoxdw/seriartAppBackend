{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>Agregar Anillo</h4>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Modelo</label>
            {{ form.anillo }}
        </div>

        <div class="mb-3">
            <label>Metal</label>
            {{ form.metal }}
        </div>

        <div class="mb-3">
            <label>Tamaño</label>
            {{ form.tamano_anillo }}
        </div>

        <div class="mb-3">
            <label>Cantidad</label>
            {{ form.cantidad }}
        </div>

        <button class="btn btn-success">Guardar</button>

        <a href="{% url 'pedido_detail' view.kwargs.pedido_id %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
