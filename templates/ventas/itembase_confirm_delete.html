{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>Eliminar producto</h4>

    <p>¿Estás seguro de eliminar:</p>

    <strong>
        {{ object.modelo.nombre }} - {{ object.subtotal }}
    </strong>

    <form method="post">
        {% csrf_token %}

        <button class="btn btn-danger">Eliminar</button>

        <a href="{% url 'pedido_detail' object.pedido.id %}" 
           class="btn btn-secondary">
            Cancelar
        </a>
    </form>

</div>

{% endblock %}
