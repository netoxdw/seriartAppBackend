{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>Eliminar observación</h4>

    <p>¿Eliminar esta observación?</p>

    <blockquote>
        {{ object.texto }}
    </blockquote>

    <form method="post">
        {% csrf_token %}

        <button class="btn btn-danger">Eliminar</button>

        <a href="{% url 'pedido_detail' object.pedido_id %}" class="btn btn-secondary">
            Cancelar
        </a>
    </form>

</div>

{% endblock %}
