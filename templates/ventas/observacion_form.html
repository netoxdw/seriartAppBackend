{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>Observación</h4>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.texto }}
        </div>

        <button class="btn btn-success">Guardar</button>

        <a href="{% url 'pedido_detail' pedido_id %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
