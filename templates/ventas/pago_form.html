{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h4>Registrar Pago</h4>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">Guardar</button>

        <a href="{% url 'pedido_detail' pedido_id %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
