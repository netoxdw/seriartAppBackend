======================================== -->

    </div>

    <!-- ACTIONS -->
    <div class="pedido-actions-list">

        <!-- EDITAR -->
        <a href="{% url 'alumno_update' pedido.alumno.id %}"
           class="pedido-action-btn warning">

        </a>

        <!-- BASE -->
        <a href="{% url 'itembase_create' pedido.id %}"

        <a href="{% url 'itemanillo_create' pedido.id %}"

        <a href="{% url 'pago_create' pedido.id %}"
